<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="theme-color" content="#1976d2">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
    <title>NLP — Spatial Repo · CRDT Sync</title>
    <style>
        :root {
            /* ── color tokens ── */
            --bg-dark: #b0a797;
            --bg-mid: #c9c1b2;
            --bg-light: #e2d9ca;
            --panel: #f0ebe0;
            --surface: #ece5d9;
            --ink: #0f1a20;
            --accent-red: #d14030;
            --accent-yellow: #e8b000;
            --accent-orange: #e07020;
            --accent-green: #4a8030;
            --muted: #6f7a80;
            --border: #3a3430;
            --structural: #2b2520;
            --cream: #f5f3f0;
            --stroke: #0f1a20;

            /* ── spacing tokens (4px scale) ── */
            --s1: 4px;
            --s2: 8px;
            --s3: 12px;
            --s4: 16px;
            --s5: 24px;
            --s6: 32px;

            /* ── font stack (modern readable monospace) ── */
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono',
                'Menlo', 'Consolas', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #1a1714;
            font-family: var(--font-mono);
            font-size: 15px;
            line-height: 1.6;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: 0.02em;
        }

        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background: transparent;
            padding: 0;
        }

        /* ── APP SHELL WITH DIAGONAL BACKGROUND TONE CUTS ── */
        #app {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            border-left: 3px solid var(--structural);
            border-right: 3px solid var(--structural);
            background: var(--bg-light);
        }
        #app::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--bg-dark);
            clip-path: polygon(0 0, 100% 0, 0 70%);
            z-index: 0;
            pointer-events: none;
        }
        #app::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--bg-mid);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ── CHISEL UTILITY (black stroke on angled panels) ── */
        .chisel {
            position: relative;
            background: transparent;
            clip-path: var(--clip-panel);
        }
        .chisel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--chisel-bg, var(--panel));
            clip-path: inherit;
            filter: drop-shadow(1px 0 0 var(--stroke)) drop-shadow(-1px 0 0 var(--stroke)) drop-shadow(0 1px 0 var(--stroke)) drop-shadow(0 -1px 0 var(--stroke));
            z-index: -1;
            pointer-events: none;
        }

        /* ── HEADER ── */
        header {
            position: sticky;
            top: 0;
            z-index: 20;
            --clip-panel: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 14px) 100%, 0 100%, 0 0);
            --chisel-bg: var(--structural);
        }
        header .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--s3) var(--s4);
            position: relative;
            z-index: 1;
        }
        header .label {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-yellow);
        }
        header .time-display {
            font-size: 0.9rem;
            color: var(--bg-light);
            letter-spacing: 0.05em;
        }

        /* ── CRDT BADGE ── */
        .crdt-badge {
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--accent-green);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.85;
            margin-right: var(--s2);
        }

        /* ── SECTION TITLE ── */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--s4) var(--s4) var(--s2);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
            color: var(--structural);
            border-bottom: 2px solid var(--border);
            margin: 0 var(--s3);
            position: relative;
            z-index: 1;
        }
        .section-actions {
            display: flex;
            gap: 6px;
        }
        .add-btn {
            cursor: pointer;
            background: var(--structural);
            color: var(--accent-yellow);
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.8rem;
            padding: var(--s2) var(--s3);
            letter-spacing: 0.08em;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
            transition: background-color 0.15s, color 0.15s;
            display: inline-flex;
            align-items: center;
            gap: var(--s1);
        }
        .add-btn:hover { background: var(--accent-orange); color: #fff; }
        .add-btn:active { background: var(--accent-red); }
        .add-btn .icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        /* ── REPO LIST ── */
        #repo-list {
            flex-shrink: 0;
            padding: 0 var(--s3) var(--s2);
            position: relative;
            z-index: 1;
        }
        .repo-row {
            --clip-panel: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
            --chisel-bg: var(--panel);
            margin-bottom: var(--s2);
            cursor: pointer;
            transition: background-color 0.1s;
        }
        .repo-row-body {
            display: grid;
            grid-template-columns: 56px 1fr auto;
            grid-template-rows: auto auto;
            gap: var(--s1) var(--s2);
            align-items: start;
            padding: var(--s3) var(--s4);
            position: relative;
            z-index: 1;
        }
        .repo-row .row-time {
            font-weight: 700;
            font-size: 1rem;
            grid-row: 1 / 3;
            align-self: center;
            color: var(--structural);
            letter-spacing: 0.03em;
        }
        .repo-row .row-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--ink);
        }
        .repo-row .row-coords {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.02em;
            display: flex;
            align-items: baseline;
            gap: var(--s1);
            flex-wrap: wrap;
        }
        .osm-link {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-green);
            text-decoration: none;
            letter-spacing: 0.04em;
            border: 1px solid var(--accent-green);
            padding: 0 var(--s1);
            clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 3px 100%, 0 calc(100% - 3px));
            display: inline-flex;
            align-items: center;
            background: transparent;
            transition: color 0.1s, background 0.1s;
            white-space: nowrap;
        }
        .osm-link:hover { background: var(--accent-green); color: #fff; }
        .osm-link .icon {
            width: 8px;
            height: 8px;
            margin-right: 2px;
            stroke: currentColor;
            stroke-width: 2;
        }
        .repo-row.selected { --chisel-bg: #faf5ea; }
        .repo-row .row-index {
            font-size: 0.65rem;
            color: var(--muted);
            opacity: 0.7;
            grid-column: 3;
            grid-row: 1 / 3;
            align-self: center;
            text-align: right;
        }

        /* ── EDIT PANEL ── */
        #edit-panel {
            display: none;
            margin: 0 var(--s3) var(--s3);
            --clip-panel: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
            --chisel-bg: var(--surface);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        #edit-panel.visible { display: block; }
        .edit-panel-inner {
            padding: var(--s4);
            position: relative;
            z-index: 1;
        }
        #edit-panel label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: var(--s1);
            margin-top: var(--s3);
        }
        #edit-panel label:first-child { margin-top: 0; }
        #edit-panel input {
            width: 100%;
            padding: var(--s2) var(--s3);
            font-family: inherit;
            font-size: 0.85rem;
            background: #faf8f3;
            border: 1.5px solid var(--border);
            color: var(--ink);
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
            outline: none;
        }
        #edit-panel input:focus { border-color: var(--accent-orange); background: #fffef9; }
        .update-btn {
            margin-top: var(--s4);
            cursor: pointer;
            background: var(--structural);
            color: var(--accent-yellow);
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.85rem;
            padding: var(--s3) var(--s5);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
            transition: background-color 0.15s, color 0.15s;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--s2);
        }
        .update-btn:hover { background: var(--accent-green); color: #fff; }
        .update-btn:active { background: var(--accent-red); color: #fff; }
        .update-btn .icon { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; }

        /* ── EXPORT PANEL ── */
        #export-panel {
            display: none;
            margin: 0 var(--s3) var(--s3);
            --clip-panel: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
            --chisel-bg: var(--surface);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        #export-panel.visible { display: block; }
        .export-panel-inner {
            padding: var(--s4);
            position: relative;
            z-index: 1;
        }

        /* ── IMPORT PANEL ── */
        #import-panel {
            display: none;
            margin: 0 var(--s3) var(--s3);
            --clip-panel: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
            --chisel-bg: var(--surface);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        #import-panel.visible { display: block; }
        .import-panel-inner {
            padding: var(--s4);
            position: relative;
            z-index: 1;
        }

        /* ── TAB SELECTOR ── */
        .tab-row {
            display: flex;
            gap: 2px;
            margin-bottom: var(--s3);
        }
        .tab-btn {
            flex: 1;
            cursor: pointer;
            background: var(--panel);
            color: var(--muted);
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.65rem;
            padding: var(--s2) var(--s2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 4px 100%, 0 calc(100% - 4px));
            transition: background-color 0.15s, color 0.15s;
        }
        .tab-btn.active {
            background: var(--structural);
            color: var(--accent-yellow);
        }
        .tab-btn:hover:not(.active) { background: #d8d0c2; }

        /* ── LOG AREA ── */
        .log-area {
            font-size: 0.6rem;
            background: #1a1714;
            color: #8a8278;
            padding: var(--s2) var(--s3);
            max-height: 70px;
            overflow-y: auto;
            line-height: 1.6;
            margin-top: var(--s2);
            clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 2px 100%, 0 calc(100% - 2px));
            word-break: break-all;
        }
        .log-area .log-ok { color: var(--accent-green); }
        .log-area .log-err { color: var(--accent-red); }
        .log-area .log-warn { color: var(--accent-orange); }

        /* ── SHARED PANEL ELEMENTS ── */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: var(--s3);
        }
        .close-btn {
            cursor: pointer;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.75rem;
            padding: 2px 6px;
            letter-spacing: 0.05em;
            transition: color 0.1s, border-color 0.1s;
        }
        .close-btn:hover { color: var(--accent-red); border-color: var(--accent-red); }

        #export-panel label, #import-panel label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: var(--s1);
            margin-top: var(--s3);
        }
        #export-panel label:first-child, #import-panel label:first-child { margin-top: 0; }

        .magnet-display {
            font-size: 0.65rem;
            word-break: break-all;
            background: #faf8f3;
            border: 1.5px solid var(--border);
            padding: var(--s2) var(--s3);
            max-height: 90px;
            overflow-y: auto;
            color: var(--ink);
            line-height: 1.5;
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
        }

        #import-panel input {
            width: 100%;
            padding: var(--s2) var(--s3);
            font-family: inherit;
            font-size: 0.75rem;
            background: #faf8f3;
            border: 1.5px solid var(--border);
            color: var(--ink);
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
            outline: none;
        }
        #import-panel input:focus { border-color: var(--accent-orange); background: #fffef9; }

        .copy-btn, .download-btn {
            margin-top: var(--s3);
            cursor: pointer;
            background: var(--structural);
            color: var(--accent-yellow);
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.8rem;
            padding: var(--s2) var(--s4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 6px 100%, 0 calc(100% - 8px));
            transition: background-color 0.15s, color 0.15s;
            width: 100%;
        }
        .copy-btn:hover, .download-btn:hover { background: var(--accent-green); color: #fff; }
        .copy-btn:active, .download-btn:active { background: var(--accent-red); color: #fff; }
        .copy-btn:disabled, .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-top: var(--s2);
        }
        .status-text.success { color: var(--accent-green); font-weight: 700; }
        .status-text.error { color: var(--accent-red); font-weight: 700; }
        .status-text.loading { color: var(--accent-orange); }

        /* ── MAP ── */
        #map-container {
            flex-shrink: 0;
            margin: 0 var(--s3) var(--s3);
            --clip-panel: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
            --chisel-bg: #eae5da;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        #map-canvas {
            display: block;
            width: 100%;
            height: 240px;
            image-rendering: crisp-edges;
            position: relative;
            z-index: 1;
        }
        .map-label {
            position: absolute;
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            pointer-events: none;
            text-transform: uppercase;
            z-index: 2;
        }
        .map-label-tl { top: var(--s2); left: var(--s2); }
        .map-label-br { bottom: var(--s2); right: var(--s2); }

        /* ── TICKET ── */
        #ticket-view {
            display: none;
            margin: 0 var(--s3) var(--s3);
            --clip-panel: polygon(0 0, 100% 0, 100% 82%, 82% 100%, 0 100%);
            --chisel-bg: var(--cream);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        #ticket-view.visible { display: block; }
        .ticket-inner {
            padding: var(--s5) var(--s4);
            position: relative;
            z-index: 1;
        }
        .ticket-name {
            font-weight: 700;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--structural);
        }
        .ticket-code {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-red);
            letter-spacing: 0.15em;
            margin: var(--s2) 0;
            word-break: break-all;
        }
        .ticket-meta {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: var(--s1) 0;
            display: flex;
            align-items: center;
            gap: var(--s2);
            flex-wrap: wrap;
        }
        .ticket-nocap {
            display: inline-flex;
            align-items: center;
            gap: var(--s1);
            background: var(--structural);
            color: var(--accent-yellow);
            font-weight: 700;
            font-size: 0.7rem;
            padding: var(--s1) var(--s3);
            letter-spacing: 0.1em;
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 4px 100%, 0 calc(100% - 4px));
            margin: var(--s2) 0;
        }
        .ticket-nocap .icon { width: 14px; height: 14px; stroke: currentColor; stroke-width: 3; }
        .checkin-btn {
            display: block;
            width: 100%;
            margin-top: var(--s4);
            cursor: pointer;
            background: var(--accent-red);
            color: #fff;
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            padding: var(--s3) var(--s5);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
            transition: background-color 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--s2);
        }
        .checkin-btn:hover { background: var(--accent-orange); }
        .checkin-btn:active { background: var(--structural); color: var(--accent-yellow); }
        .checkin-btn .icon { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2.5; }
        .ticket-perf {
            position: absolute;
            top: var(--s3);
            right: var(--s4);
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            z-index: 1;
        }
        .osm-link-ticket {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-green);
            text-decoration: none;
            letter-spacing: 0.04em;
            border: 1px solid var(--accent-green);
            padding: var(--s1) var(--s2);
            clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 3px 100%, 0 calc(100% - 3px));
            background: transparent;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }
        .osm-link-ticket:hover { background: var(--accent-green); color: #fff; }

        /* ── CONFIRMATION ── */
        #confirmation {
            display: none;
            margin: 0 var(--s3) var(--s4);
            --clip-panel: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
            --chisel-bg: var(--structural);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            color: var(--accent-green);
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.7;
        }
        #confirmation.visible { display: block; animation: pulse-stroke 1.8s ease-in-out infinite; }
        .conf-inner { padding: var(--s5) var(--s4); position: relative; z-index: 1; }
        @keyframes pulse-stroke {
            0%, 100% { filter: drop-shadow(1px 0 0 var(--accent-green)) drop-shadow(-1px 0 0 var(--accent-green)) drop-shadow(0 1px 0 var(--accent-green)) drop-shadow(0 -1px 0 var(--accent-green)); }
            50% { filter: drop-shadow(1px 0 0 var(--accent-yellow)) drop-shadow(-1px 0 0 var(--accent-yellow)) drop-shadow(0 1px 0 var(--accent-yellow)) drop-shadow(0 -1px 0 var(--accent-yellow)); }
        }
        .conf-accent { color: var(--accent-yellow); font-size: 1.4rem; display: block; margin-top: var(--s1); }

        /* ── DIVIDERS ── */
        .divider {
            height: 3px;
            background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 8px, transparent 8px, transparent 16px);
            margin: var(--s1) var(--s3);
            opacity: 0.4;
            position: relative;
            z-index: 1;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: var(--s5) var(--s4);
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1px dashed var(--border);
            margin: 0 var(--s3) var(--s3);
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
            position: relative;
            z-index: 1;
            background: var(--panel);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-mid); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }

        /* ── LOADING OVERLAY ── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--structural);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: var(--accent-yellow);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: opacity 0.4s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <!-- loading overlay -->
    <div id="loading-overlay">Initializing CRDT...</div>

    <!-- hidden SVG icon set (modern monochrome) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none;" aria-hidden="true">
        <defs>
            <g id="icon-plus">
                <line x1="5" y1="0" x2="5" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
                <line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
            </g>
            <g id="icon-check">
                <polyline points="1,5 4,8 9,2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
            </g>
            <g id="icon-arrow">
                <line x1="2" y1="8" x2="8" y2="2" stroke="currentColor" stroke-width="2.5"/>
                <polyline points="4,2 8,2 8,6" fill="none" stroke="currentColor" stroke-width="2.5"/>
            </g>
            <g id="icon-nocapture">
                <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="3"/>
                <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="3"/>
            </g>
            <g id="icon-arrow-up">
                <line x1="5" y1="8" x2="5" y2="2" stroke="currentColor" stroke-width="2.5"/>
                <polyline points="2,5 5,2 8,5" fill="none" stroke="currentColor" stroke-width="2.5"/>
            </g>
            <g id="icon-arrow-down">
                <line x1="5" y1="2" x2="5" y2="8" stroke="currentColor" stroke-width="2.5"/>
                <polyline points="2,5 5,8 8,5" fill="none" stroke="currentColor" stroke-width="2.5"/>
            </g>
        </defs>
    </svg>

    <div id="app">
        <header class="chisel">
            <div class="header-content">
                <span class="label">NLP</span>
                <div style="display:flex;align-items:center;">
                    <span class="crdt-badge" id="crdt-status">CRDT</span>
                    <span class="time-display" id="header-time">--:--</span>
                </div>
            </div>
        </header>

        <div class="section-title">
            <span>PARTIES</span>
            <div class="section-actions">
                <button class="add-btn" id="btn-export">
                    <svg class="icon" viewBox="0 0 10 10"><use href="#icon-arrow-up"/></svg> EXP
                </button>
                <button class="add-btn" id="btn-import">
                    <svg class="icon" viewBox="0 0 10 10"><use href="#icon-arrow-down"/></svg> IMP
                </button>
                <button class="add-btn" id="btn-add">
                    <svg class="icon" viewBox="0 0 10 10"><use href="#icon-plus"/></svg> ADD
                </button>
            </div>
        </div>

        <div id="repo-list"></div>

        <div id="edit-panel" class="chisel">
            <div class="edit-panel-inner">
                <label for="edit-name">Name</label>
                <input type="text" id="edit-name" placeholder="EVENT NAME" autocomplete="off">
                <label for="edit-time">Time (HH:MM)</label>
                <input type="text" id="edit-time" placeholder="21:30" autocomplete="off">
                <label for="edit-coords">GPS (lon, lat)</label>
                <input type="text" id="edit-coords" placeholder="-74.006,40.7128" autocomplete="off">
                <button class="update-btn" id="btn-update">
                    <svg class="icon" viewBox="0 0 10 10"><use href="#icon-check"/></svg> UPDATE
                </button>
            </div>
        </div>

        <div id="export-panel" class="chisel">
            <div class="export-panel-inner">
                <div class="panel-header">
                    <span>EXPORT</span>
                    <button class="close-btn" id="btn-close-export">X</button>
                </div>
                <div class="tab-row">
                    <button class="tab-btn active" id="tab-export-b64" data-tab="b64">BASE64</button>
                    <button class="tab-btn" id="tab-export-wt" data-tab="wt">TORRENT</button>
                </div>
                <!-- Base64 export -->
                <div id="export-b64-section">
                    <label>CRDT VECTOR (BASE64)</label>
                    <div class="magnet-display" id="b64-uri"></div>
                    <button class="copy-btn" id="btn-copy-b64">COPY</button>
                </div>
                <!-- WebTorrent export -->
                <div id="export-wt-section" style="display:none">
                    <div id="export-status" class="status-text">Idle</div>
                    <div id="export-magnet-section" style="display:none">
                        <label>MAGNET URI</label>
                        <div class="magnet-display" id="magnet-uri"></div>
                        <button class="copy-btn" id="btn-copy-magnet">COPY MAGNET</button>
                    </div>
                    <div class="log-area" id="export-log"></div>
                </div>
            </div>
        </div>

        <div id="import-panel" class="chisel">
            <div class="import-panel-inner">
                <div class="panel-header">
                    <span>IMPORT</span>
                    <button class="close-btn" id="btn-close-import">X</button>
                </div>
                <div class="tab-row">
                    <button class="tab-btn active" id="tab-import-b64" data-tab="b64">BASE64</button>
                    <button class="tab-btn" id="tab-import-wt" data-tab="wt">TORRENT</button>
                </div>
                <!-- Base64 import -->
                <div id="import-b64-section">
                    <label for="import-b64-input">CRDT VECTOR (BASE64)</label>
                    <textarea id="import-b64-input" placeholder="Paste base64 string here..." rows="3" style="width:100%;padding:var(--s2) var(--s3);font-family:inherit;font-size:0.65rem;background:#faf8f3;border:1.5px solid var(--border);color:var(--ink);outline:none;resize:vertical;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));"></textarea>
                    <button class="download-btn" id="btn-import-b64">MERGE</button>
                    <div id="import-b64-status" class="status-text"></div>
                </div>
                <!-- WebTorrent import -->
                <div id="import-wt-section" style="display:none">
                    <label for="import-magnet-input">MAGNET URI</label>
                    <input type="text" id="import-magnet-input" placeholder="magnet:?xt=urn:btih:..." autocomplete="off">
                    <button class="download-btn" id="btn-download">DOWNLOAD</button>
                    <div id="import-status" class="status-text"></div>
                    <div class="log-area" id="import-log"></div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div id="map-container" class="chisel">
            <canvas id="map-canvas"></canvas>
            <span class="map-label map-label-tl">MAP</span>
            <span class="map-label map-label-br" id="map-coord-label">—</span>
        </div>

        <div id="ticket-view" class="chisel">
            <div class="ticket-inner">
                <span class="ticket-perf">TICKET</span>
                <div class="ticket-name" id="ticket-name">—</div>
                <div class="ticket-code" id="ticket-code">————</div>
                <div class="ticket-meta" id="ticket-time">—</div>
                <div class="ticket-meta" id="ticket-coords">
                    <span>—</span>
                    <a class="osm-link-ticket" id="ticket-osm" href="#" target="_blank">
                        <svg class="icon" width="8" height="8" viewBox="0 0 10 10"><use href="#icon-arrow"/></svg> OSM
                    </a>
                </div>
                <span class="ticket-nocap">
                    <svg class="icon" viewBox="0 0 10 10"><use href="#icon-nocapture"/></svg> NO CAPTURE
                </span>
                <button class="checkin-btn" id="btn-checkin">
                    <svg class="icon" viewBox="0 0 10 10"><use href="#icon-check"/></svg> CHECK IN
                </button>
            </div>
        </div>

        <div id="confirmation" class="chisel">
            <div class="conf-inner">
                YOU'RE IN.<br><span class="conf-accent">SEE YOU SOON.</span>
            </div>
        </div>
    </div>

    <!-- WebTorrent browser bundle -->
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@1.9.7/webtorrent.min.js"></script>

    <script type="module">
        // ── Yjs CRDT Import ──
        import * as Y from 'https://esm.sh/yjs@13.6.24'

        // ── Yjs Document ──
        const ydoc = new Y.Doc()
        const yparties = ydoc.getArray('parties')

        // Seed initial data if empty
        if (yparties.length === 0) {
            ydoc.transact(() => {
                const seed = [
                    { name: 'WAREHOUSE FREQ', time: '21:30', coords: [-73.9855, 40.7484] },
                    { name: 'BRIDGE PULSE', time: '22:00', coords: [-73.9780, 40.7527] },
                    { name: 'CANAL RITUAL', time: '23:15', coords: [-73.9910, 40.7450] },
                    { name: 'ROOFTOP STATIC', time: '00:30', coords: [-73.9812, 40.7580] },
                ]
                seed.forEach(ev => {
                    const ym = new Y.Map()
                    ym.set('name', ev.name)
                    ym.set('time', ev.time)
                    const yc = new Y.Array()
                    yc.push(ev.coords)
                    ym.set('coords', yc)
                    yparties.push([ym])
                })
            })
        }

        // ── Helper: read events from Yjs CRDT ──
        function getEvents() {
            return yparties.toArray().map(ym => ({
                name: ym.get('name') || 'UNTITLED',
                time: ym.get('time') || '00:00',
                coords: (ym.get('coords') && ym.get('coords').toArray()) || [0, 0]
            }))
        }

        // ── WebTorrent Trackers ──
        const WT_TRACKERS = [
            'wss://tracker.openwebtorrent.com',
            'wss://tracker.webtorrent.dev',
        ]

        // ── WebTorrent Client ──
        let wtClient = null
        let currentSeed = null

        function getWT() {
            if (!wtClient && window.WebTorrent) {
                wtClient = new window.WebTorrent({
                    tracker: {
                        announce: WT_TRACKERS,
                    },
                    dht: false,  // browsers can't do DHT, WebRTC-only
                })
                wtClient.on('error', err => {
                    console.error('[WebTorrent client error]', err)
                })
            }
            return wtClient
        }

        // ── Log helper ──
        function logTo(el, msg, cls) {
            if (!el) return
            const d = document.createElement('div')
            if (cls) d.className = cls
            const t = new Date()
            d.textContent = '[' + String(t.getMinutes()).padStart(2,'0') + ':' + String(t.getSeconds()).padStart(2,'0') + '] ' + msg
            el.appendChild(d)
            el.scrollTop = el.scrollHeight
        }

        // ── App State (UI only, data lives in Yjs) ──
        const state = {
            selectedIndex: null,
            showTicket: false,
            checked: false,
            editIsNew: false,
        }

        // ── DOM References ──
        const $ = s => document.querySelector(s)
        const repoList = $('#repo-list')
        const editPanel = $('#edit-panel')
        const ticketView = $('#ticket-view')
        const confirmation = $('#confirmation')
        const mapCanvas = $('#map-canvas')
        const mapCoordLabel = $('#map-coord-label')
        const headerTime = $('#header-time')
        const btnAdd = $('#btn-add')
        const btnUpdate = $('#btn-update')
        const btnCheckin = $('#btn-checkin')
        const inputName = $('#edit-name')
        const inputTime = $('#edit-time')
        const inputCoords = $('#edit-coords')
        const ticketOsmLink = $('#ticket-osm')
        const exportPanel = $('#export-panel')
        const importPanel = $('#import-panel')
        const btnExport = $('#btn-export')
        const btnImport = $('#btn-import')
        const btnCloseExport = $('#btn-close-export')
        const btnCloseImport = $('#btn-close-import')
        const btnCopyMagnet = $('#btn-copy-magnet')
        const btnCopyB64 = $('#btn-copy-b64')
        const btnDownload = $('#btn-download')
        const btnImportB64 = $('#btn-import-b64')
        const magnetDisplay = $('#magnet-uri')
        const b64Display = $('#b64-uri')
        const importInput = $('#import-magnet-input')
        const importB64Input = $('#import-b64-input')
        const exportStatus = $('#export-status')
        const importStatus = $('#import-status')
        const importB64Status = $('#import-b64-status')
        const exportMagnetSection = $('#export-magnet-section')
        const exportLog = $('#export-log')
        const importLog = $('#import-log')
        const crdtStatus = $('#crdt-status')
        const loadingOverlay = $('#loading-overlay')

        // ── Clock ──
        function updateClock() {
            const now = new Date()
            headerTime.textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0')
        }
        updateClock()
        setInterval(updateClock, 15000)

        // ── CRDT Status Badge ──
        crdtStatus.textContent = 'CRDT \u25CF'

        // ── Yjs Observer: re-render on any CRDT change ──
        let renderTimer = null
        function scheduleRender() {
            clearTimeout(renderTimer)
            renderTimer = setTimeout(() => {
                renderRepoList()
                renderMap()
                // Keep ticket view in sync
                if (state.showTicket && state.selectedIndex !== null) {
                    const events = getEvents()
                    if (state.selectedIndex >= events.length) {
                        state.selectedIndex = null
                        state.showTicket = false
                        ticketView.classList.remove('visible')
                    } else {
                        renderTicket()
                    }
                }
            }, 50)
        }
        yparties.observeDeep(scheduleRender)

        // ── Render: Map ──
        function renderMap() {
            const events = getEvents()
            const canvas = mapCanvas
            const container = canvas.parentElement
            const rect = container.getBoundingClientRect()
            const w = rect.width
            const h = 240
            const dpr = Math.min(window.devicePixelRatio || 1, 2)
            canvas.width = w * dpr
            canvas.height = h * dpr
            canvas.style.width = w + 'px'
            canvas.style.height = h + 'px'
            const ctx = canvas.getContext('2d')
            ctx.setTransform(1, 0, 0, 1, 0, 0)
            ctx.scale(dpr, dpr)
            ctx.fillStyle = '#eae5da'
            ctx.fillRect(0, 0, w, h)
            ctx.strokeStyle = '#bfb7ab'
            ctx.lineWidth = 0.5
            const gx = 40, gy = 40
            for (let x = gx; x < w; x += gx) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke() }
            for (let y = gy; y < h; y += gy) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke() }
            ctx.strokeStyle = '#8a8278'; ctx.lineWidth = 1
            ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke()
            ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke()
            ctx.strokeStyle = '#3a3430'; ctx.lineWidth = 2; ctx.strokeRect(1, 1, w - 2, h - 2)
            if (events.length === 0) { mapCoordLabel.textContent = 'NO DATA'; return }
            let minLon = Infinity, maxLon = -Infinity, minLat = Infinity, maxLat = -Infinity
            events.forEach(ev => {
                if (ev.coords[0] < minLon) minLon = ev.coords[0]
                if (ev.coords[0] > maxLon) maxLon = ev.coords[0]
                if (ev.coords[1] < minLat) minLat = ev.coords[1]
                if (ev.coords[1] > maxLat) maxLat = ev.coords[1]
            })
            const lonSpan = maxLon - minLon || 0.02, latSpan = maxLat - minLat || 0.02, pad = 0.25
            const lonMin = minLon - lonSpan * pad, lonMax = maxLon + lonSpan * pad
            const latMin = minLat - latSpan * pad, latMax = maxLat + latSpan * pad
            const lonRange = lonMax - lonMin, latRange = latMax - latMin
            const margin = 28, plotW = w - margin * 2, plotH = h - margin * 2
            function project(lon, lat) { return [margin + ((lon - lonMin) / lonRange) * plotW, margin + ((latMax - lat) / latRange) * plotH] }
            const midLon = (lonMin + lonMax) / 2, midLat = (latMin + latMax) / 2
            const [cx, cy] = project(midLon, midLat)
            ctx.fillStyle = '#6f7a80'; ctx.font = '9px "JetBrains Mono","Courier New",monospace'; ctx.textAlign = 'center'
            ctx.fillText(midLat.toFixed(4), cx, h - 6); ctx.fillText(midLon.toFixed(4), cx, 14)
            mapCoordLabel.textContent = 'lon ' + midLon.toFixed(4) + '  lat ' + midLat.toFixed(4)
            events.forEach((ev, i) => {
                const [px, py] = project(ev.coords[0], ev.coords[1]), isFirst = i === 0, size = 7
                ctx.save(); ctx.translate(px, py); ctx.rotate(Math.PI / 4)
                ctx.fillStyle = isFirst ? '#d14030' : '#161310'; ctx.fillRect(-size / 2, -size / 2, size, size); ctx.restore()
                if (isFirst) { ctx.beginPath(); ctx.arc(px, py, size + 4, 0, Math.PI * 2); ctx.strokeStyle = '#d14030'; ctx.lineWidth = 1.5; ctx.stroke() }
                ctx.fillStyle = isFirst ? '#fff' : '#e8b000'; ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill()
            })
        }

        // ── Render: Repo List ──
        function renderRepoList() {
            const events = getEvents()
            if (events.length === 0) {
                repoList.innerHTML = '<div class="empty-state">NO PARTIES REGISTERED.<br>PRESS + ADD TO CREATE ONE.</div>'
            } else {
                repoList.innerHTML = events.map((ev, i) => {
                    const osmUrl = `https://www.openstreetmap.org/?mlat=${ev.coords[1]}&mlon=${ev.coords[0]}`
                    return `<div class="repo-row chisel${state.selectedIndex === i ? ' selected' : ''}" data-index="${i}"><div class="repo-row-body">
                        <span class="row-time">${ev.time}</span><span class="row-name">${ev.name}</span>
                        <span class="row-coords">${ev.coords[0].toFixed(4)}, ${ev.coords[1].toFixed(4)}
                            <a class="osm-link" href="${osmUrl}" target="_blank"><svg class="icon" viewBox="0 0 10 10"><use href="#icon-arrow"/></svg>OSM</a></span>
                        <span class="row-index">#${i}</span></div></div>`
                }).join('')
            }
            repoList.querySelectorAll('.repo-row').forEach(row => {
                row.addEventListener('click', function (e) { if (e.target.closest('a')) return; const idx = parseInt(this.dataset.index); openEditForEvent(idx) })
            })
        }

        // ── Edit: Open for existing event ──
        function openEditForEvent(index) {
            const events = getEvents()
            state.selectedIndex = index; state.editIsNew = false; state.showTicket = false; state.checked = false
            const ev = events[index]
            inputName.value = ev.name; inputTime.value = ev.time
            inputCoords.value = ev.coords[0].toFixed(5) + ', ' + ev.coords[1].toFixed(5)
            editPanel.classList.add('visible')
            ticketView.classList.remove('visible'); confirmation.classList.remove('visible')
            exportPanel.classList.remove('visible'); importPanel.classList.remove('visible')
            renderRepoList(); inputName.focus()
        }

        // ── Edit: Open for new event ──
        function openEditForNew() {
            state.selectedIndex = null; state.editIsNew = true; state.showTicket = false; state.checked = false
            inputName.value = ''; inputTime.value = ''; inputCoords.value = ''
            editPanel.classList.add('visible')
            ticketView.classList.remove('visible'); confirmation.classList.remove('visible')
            exportPanel.classList.remove('visible'); importPanel.classList.remove('visible')
            renderRepoList(); inputName.focus()
        }

        // ── Edit: Handle update (writes to Yjs) ──
        function handleUpdate() {
            const name = inputName.value.trim() || 'UNTITLED', time = inputTime.value.trim() || '00:00'
            const parts = inputCoords.value.trim().split(',').map(s => parseFloat(s.trim()))
            let lon = parts[0], lat = parts[1]
            if (isNaN(lon) || isNaN(lat)) { lon = -74.0; lat = 40.71 }
            const coords = [lon, lat]

            ydoc.transact(() => {
                if (state.editIsNew) {
                    const ym = new Y.Map()
                    ym.set('name', name)
                    ym.set('time', time)
                    const yc = new Y.Array()
                    yc.push(coords)
                    ym.set('coords', yc)
                    yparties.push([ym])
                    state.selectedIndex = yparties.length - 1
                } else if (state.selectedIndex !== null) {
                    const ym = yparties.get(state.selectedIndex)
                    if (ym) {
                        ym.set('name', name)
                        ym.set('time', time)
                        const yc = ym.get('coords')
                        if (yc) {
                            yc.delete(0, yc.length)
                            yc.push(coords)
                        }
                    }
                }
            })

            state.showTicket = true; state.checked = false; state.editIsNew = false
            editPanel.classList.remove('visible'); confirmation.classList.remove('visible')
            renderRepoList(); renderTicket(); renderMap()
        }

        // ── Render: Ticket ──
        function renderTicket() {
            if (!state.showTicket || state.selectedIndex === null) { ticketView.classList.remove('visible'); return }
            const events = getEvents()
            const ev = events[state.selectedIndex]
            if (!ev) { ticketView.classList.remove('visible'); return }
            $('#ticket-name').textContent = ev.name
            $('#ticket-code').textContent = generateCode(ev)
            $('#ticket-time').textContent = 'TIME: ' + ev.time
            const coordSpan = document.querySelector('#ticket-coords span')
            if (coordSpan) coordSpan.textContent = 'GPS: ' + ev.coords[0].toFixed(5) + ', ' + ev.coords[1].toFixed(5)
            ticketOsmLink.href = `https://www.openstreetmap.org/?mlat=${ev.coords[1]}&mlon=${ev.coords[0]}`
            ticketView.classList.add('visible')
        }

        function generateCode(ev) {
            const h = Math.abs(ev.name.split('').reduce((a, c) => a + c.charCodeAt(0), 0)).toString(16).toUpperCase().slice(-6)
            const m = Math.abs(Math.round(ev.coords[0] * 10000 + ev.coords[1] * 10000)).toString(16).toUpperCase().slice(-4)
            return 'NLP-' + h + '-' + m
        }

        // ── Check In ──
        function handleCheckIn() {
            state.checked = true; ticketView.classList.remove('visible'); confirmation.classList.add('visible')
            confirmation.scrollIntoView({ behavior: 'smooth', block: 'center' }); renderRepoList()
        }

        // ── EXPORT: Encode Yjs state as base64 (instant, always works) ──
        function generateB64Export() {
            const update = Y.encodeStateAsUpdate(ydoc)
            let binary = ''
            update.forEach(b => { binary += String.fromCharCode(b) })
            return btoa(binary)
        }

        // ── EXPORT: Main handler ──
        function handleExport() {
            editPanel.classList.remove('visible'); importPanel.classList.remove('visible')
            exportPanel.classList.add('visible')
            exportLog.innerHTML = ''

            // Always generate base64 instantly
            const b64 = generateB64Export()
            b64Display.textContent = b64

            // Reset WebTorrent section
            exportMagnetSection.style.display = 'none'
            magnetDisplay.textContent = ''
            exportStatus.textContent = 'Idle — click TORRENT tab to seed'
            exportStatus.className = 'status-text'
        }

        // ── EXPORT: Start WebTorrent seeding ──
        function handleWTExport() {
            const client = getWT()
            if (!client) {
                exportStatus.textContent = 'WebTorrent unavailable'
                exportStatus.className = 'status-text error'
                return
            }

            // Remove previous seed torrent
            if (currentSeed) {
                try { client.remove(currentSeed.infoHash) } catch (e) { /* ignore */ }
                currentSeed = null
            }

            exportMagnetSection.style.display = 'none'
            magnetDisplay.textContent = ''
            exportLog.innerHTML = ''
            exportStatus.textContent = 'Encoding CRDT state...'
            exportStatus.className = 'status-text loading'
            logTo(exportLog, 'Starting seed...', 'log-warn')

            const update = Y.encodeStateAsUpdate(ydoc)
            const blob = new Blob([update], { type: 'application/octet-stream' })
            const fileName = 'nlp-parties-' + Date.now() + '.bin'

            exportStatus.textContent = 'Seeding via WebTorrent...'
            logTo(exportLog, 'Creating torrent with ' + WT_TRACKERS.length + ' tracker(s)')

            const seedOpts = {
                name: fileName,
                announce: WT_TRACKERS,
            }

            client.seed(blob, seedOpts, torrent => {
                currentSeed = torrent
                magnetDisplay.textContent = torrent.magnetURI
                exportMagnetSection.style.display = 'block'
                exportStatus.textContent = 'Seeding \u25CF 0 peer(s)'
                exportStatus.className = 'status-text success'
                logTo(exportLog, 'Seeding! infoHash: ' + torrent.infoHash.slice(0,12) + '...', 'log-ok')
                logTo(exportLog, 'Magnet URI ready — copy and share')

                // Track peer connections
                torrent.on('wire', wire => {
                    logTo(exportLog, 'Peer connected: ' + (wire.peerId || 'unknown').slice(0,8), 'log-ok')
                    exportStatus.textContent = 'Seeding \u25CF ' + torrent.numPeers + ' peer(s)'
                })

                torrent.on('warning', msg => {
                    logTo(exportLog, 'Warn: ' + msg, 'log-warn')
                })

                torrent.on('error', err => {
                    exportStatus.textContent = 'Error: ' + err.message
                    exportStatus.className = 'status-text error'
                    logTo(exportLog, 'Error: ' + err.message, 'log-err')
                })

                // Update peer count periodically
                const peerInterval = setInterval(() => {
                    if (!currentSeed || currentSeed.infoHash !== torrent.infoHash) {
                        clearInterval(peerInterval); return
                    }
                    exportStatus.textContent = 'Seeding \u25CF ' + torrent.numPeers + ' peer(s)'
                }, 3000)
            })

            client.on('error', err => {
                exportStatus.textContent = 'Error: ' + err.message
                exportStatus.className = 'status-text error'
                logTo(exportLog, 'Client error: ' + err.message, 'log-err')
            })
        }

        // ── Copy to clipboard (generic) ──
        function copyToClipboard(text, btn) {
            if (!text) return
            const orig = btn.textContent
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    btn.textContent = 'COPIED'
                    setTimeout(() => { btn.textContent = orig }, 2000)
                }).catch(fallback)
            } else {
                fallback()
            }
            function fallback() {
                const ta = document.createElement('textarea')
                ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0'
                document.body.appendChild(ta); ta.select()
                document.execCommand('copy'); document.body.removeChild(ta)
                btn.textContent = 'COPIED'
                setTimeout(() => { btn.textContent = orig }, 2000)
            }
        }

        // ── IMPORT: Show import panel ──
        function handleImport() {
            editPanel.classList.remove('visible'); exportPanel.classList.remove('visible')
            importPanel.classList.add('visible')
            importInput.value = ''; importB64Input.value = ''
            importStatus.textContent = ''; importStatus.className = 'status-text'
            importB64Status.textContent = ''; importB64Status.className = 'status-text'
            importLog.innerHTML = ''
            btnDownload.disabled = false
            importB64Input.focus()
        }

        // ── IMPORT: Base64 merge (instant, always works) ──
        function handleB64Import() {
            const b64 = importB64Input.value.trim()
            if (!b64) {
                importB64Status.textContent = 'Paste a base64 string first'
                importB64Status.className = 'status-text error'
                return
            }
            try {
                const binary = atob(b64)
                const bytes = new Uint8Array(binary.length)
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i)

                ydoc.transact(() => {
                    Y.applyUpdate(ydoc, bytes)
                })

                importB64Status.textContent = 'Merge complete!'
                importB64Status.className = 'status-text success'

                state.selectedIndex = null; state.showTicket = false; state.checked = false
                ticketView.classList.remove('visible'); editPanel.classList.remove('visible')
                confirmation.classList.remove('visible')

                setTimeout(() => { importPanel.classList.remove('visible') }, 2000)
            } catch (e) {
                importB64Status.textContent = 'Error: Invalid base64 data — ' + e.message
                importB64Status.className = 'status-text error'
            }
        }

        // ── Helper: get blob from WebTorrent file (v1/v2 compat) ──
        async function getFileBlob(file) {
            if (typeof file.blob === 'function') {
                return await file.blob()
            }
            return new Promise((resolve, reject) => {
                file.getBlob((err, blob) => {
                    if (err) reject(err)
                    else resolve(blob)
                })
            })
        }

        // ── IMPORT: WebTorrent download and merge ──
        async function doImport() {
            const magnetURI = importInput.value.trim()
            if (!magnetURI) {
                importStatus.textContent = 'Enter a magnet URI'
                importStatus.className = 'status-text error'
                return
            }

            const client = getWT()
            if (!client) {
                importStatus.textContent = 'WebTorrent unavailable'
                importStatus.className = 'status-text error'
                return
            }

            importLog.innerHTML = ''
            importStatus.textContent = 'Connecting to trackers...'
            importStatus.className = 'status-text loading'
            btnDownload.disabled = true
            logTo(importLog, 'Adding torrent: ' + magnetURI.slice(0, 60) + '...', 'log-warn')

            // Timeout after 90s
            const timeoutId = setTimeout(() => {
                importStatus.textContent = 'Timeout: No peers found. Try BASE64 tab instead.'
                importStatus.className = 'status-text error'
                btnDownload.disabled = false
                logTo(importLog, 'Timed out after 90s', 'log-err')
            }, 90000)

            try {
                const addOpts = {
                    announce: WT_TRACKERS,
                }

                client.add(magnetURI, addOpts, torrent => {
                    clearTimeout(timeoutId)
                    importStatus.textContent = 'Metadata received — downloading... 0%'
                    importStatus.className = 'status-text loading'
                    logTo(importLog, 'Torrent ready! ' + torrent.files.length + ' file(s), ' + torrent.length + ' bytes', 'log-ok')

                    // Log tracker events
                    torrent.on('warning', msg => {
                        logTo(importLog, 'Warn: ' + msg, 'log-warn')
                    })

                    torrent.on('wire', wire => {
                        logTo(importLog, 'Peer found: ' + (wire.peerId || '').slice(0,8), 'log-ok')
                    })

                    torrent.on('download', () => {
                        importStatus.textContent = 'Downloading... ' + Math.round(torrent.progress * 100) + '%'
                    })

                    torrent.on('done', async () => {
                        importStatus.textContent = 'Processing CRDT data...'
                        importStatus.className = 'status-text loading'
                        logTo(importLog, 'Download complete, parsing CRDT...', 'log-ok')

                        try {
                            const file = torrent.files[0]
                            const blob = await getFileBlob(file)
                            const buffer = await blob.arrayBuffer()
                            const update = new Uint8Array(buffer)

                            ydoc.transact(() => {
                                Y.applyUpdate(ydoc, update)
                            })

                            importStatus.textContent = 'Import complete!'
                            importStatus.className = 'status-text success'
                            logTo(importLog, 'CRDT merged successfully!', 'log-ok')

                            // Reset UI state
                            state.selectedIndex = null
                            state.showTicket = false
                            state.checked = false
                            ticketView.classList.remove('visible')
                            editPanel.classList.remove('visible')
                            confirmation.classList.remove('visible')

                            setTimeout(() => {
                                importPanel.classList.remove('visible')
                                try { client.remove(torrent.infoHash) } catch (e) { /* ignore */ }
                                btnDownload.disabled = false
                            }, 2500)
                        } catch (e) {
                            importStatus.textContent = 'Error: Invalid CRDT data'
                            importStatus.className = 'status-text error'
                            logTo(importLog, 'Parse error: ' + e.message, 'log-err')
                            btnDownload.disabled = false
                        }
                    })

                    torrent.on('error', err => {
                        clearTimeout(timeoutId)
                        importStatus.textContent = 'Error: ' + err.message
                        importStatus.className = 'status-text error'
                        logTo(importLog, 'Torrent error: ' + err.message, 'log-err')
                        btnDownload.disabled = false
                    })
                })
            } catch (e) {
                clearTimeout(timeoutId)
                importStatus.textContent = 'Error: ' + e.message
                importStatus.className = 'status-text error'
                logTo(importLog, 'Add error: ' + e.message, 'log-err')
                btnDownload.disabled = false
            }
        }

        // ── Event Listeners ──
        btnAdd.addEventListener('click', openEditForNew)
        btnUpdate.addEventListener('click', handleUpdate)
        btnCheckin.addEventListener('click', handleCheckIn)
        btnExport.addEventListener('click', handleExport)
        btnImport.addEventListener('click', handleImport)
        btnCloseExport.addEventListener('click', () => exportPanel.classList.remove('visible'))
        btnCloseImport.addEventListener('click', () => importPanel.classList.remove('visible'))
        btnCopyMagnet.addEventListener('click', () => copyToClipboard(magnetDisplay.textContent, btnCopyMagnet))
        btnCopyB64.addEventListener('click', () => copyToClipboard(b64Display.textContent, btnCopyB64))
        btnDownload.addEventListener('click', doImport)
        btnImportB64.addEventListener('click', handleB64Import)

        // ── Tab switching ──
        function setupTabs(prefix, onSwitch) {
            const tabBtns = document.querySelectorAll('.tab-btn[id^="tab-' + prefix + '-"]')
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'))
                    btn.classList.add('active')
                    const tab = btn.dataset.tab
                    const b64Sec = document.getElementById(prefix + '-b64-section')
                    const wtSec = document.getElementById(prefix + '-wt-section')
                    if (b64Sec) b64Sec.style.display = tab === 'b64' ? '' : 'none'
                    if (wtSec) wtSec.style.display = tab === 'wt' ? '' : 'none'
                    if (onSwitch) onSwitch(tab)
                })
            })
        }
        setupTabs('export', tab => { if (tab === 'wt') handleWTExport() })
        setupTabs('import')

        ;[inputName, inputTime, inputCoords].forEach(inp => {
            inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') handleUpdate() })
        })

        importInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') doImport() })
        importB64Input.addEventListener('keydown', function (e) { if (e.key === 'Enter') handleB64Import() })

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                editPanel.classList.remove('visible')
                exportPanel.classList.remove('visible')
                importPanel.classList.remove('visible')
                state.selectedIndex = null; state.editIsNew = false; renderRepoList()
            }
        })

        let resizeTimeout
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(renderMap, 200) })

        // ── Initialize ──
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                renderRepoList()
                renderMap()
                // Hide loading overlay
                loadingOverlay.classList.add('hidden')
                setTimeout(() => { loadingOverlay.style.display = 'none' }, 500)
            })
        })
    </script>
    <script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service worker registered'))
      .catch(err => console.warn('SW registration failed:', err));
  }

  // beforeinstallprompt flow (optional — shows a custom button when available)
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // document.body.appendChild(btn);
    // btn.addEventListener('click', async () => { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; });
    console.log('beforeinstallprompt saved event');
  });

  window.addEventListener('appinstalled', () => {
    console.log('PWA installed');
  });
</script>
